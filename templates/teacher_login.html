{% extends "base.html" %}

{% block content %}
<div class="card" style="max-width:420px; margin:60px auto;">

    <h1 style="margin-bottom:4px;">Simprentice</h1>
    <h2 style="margin-top:0; color:#555; font-weight:normal;">Teacher sign in</h2>

    {% if error %}
        <div class="error" style="margin-bottom:16px;">{{ error }}</div>
    {% endif %}

    <form method="post" action="/teacher-login" style="display:flex; flex-direction:column; gap:14px;">

        <div>
            <label>Email</label>
            <input type="email" name="email" required placeholder="j.smith@school.ac.uk">
        </div>

        <div>
            <label>Password</label>
            <input type="password" name="password" required>
        </div>

        <button type="submit" class="btn teacher" style="margin-top:8px;">Sign in</button>

    </form>

    <div class="link" style="margin-top:20px; text-align:center;">
        No account yet? <a href="/teacher-register">Register here</a>
    </div>

</div>
{% endblock %}
