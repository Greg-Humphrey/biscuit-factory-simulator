{% extends "base.html" %}

{% block nav %}
<nav class="platform-nav">
    <a class="brand" href="/">Simprentice</a>
    <div class="user-area">
        <a class="home-icon" href="/" title="Homepage">🏠</a>
    </div>
</nav>
{% endblock %}

{% block page_content %}
<div class="sim-bg sim-bg-biscuit">
    <div class="sim-box">

        <nav class="sim-inner-nav">
            <div style="display:flex; align-items:center;">
                <span class="sim-title">🏭 Biscuit Factory Simulator</span>
            </div>
            <div style="display:flex; align-items:center;">
                {% if user %}
                    <span class="team-name">🧑‍🤝‍🧑 {{ user.team_name }}</span>
                    <a href="/logout" class="btn small">Logout</a>
                {% endif %}
            </div>
        </nav>

        <div class="sim-content">
            {% block content %}{% endblock %}
        </div>

    </div>
</div>
{% endblock %}

{% block scripts %}
<script>

function showGlobalModal(title, message, confirmCallback){

    const modal = document.getElementById("globalModal");
    document.getElementById("modalTitle").innerText = title;
    document.getElementById("modalMessage").innerText = message;
    modal.style.display = "flex";

    document.getElementById("modalConfirmBtn").onclick = function(){
        closeGlobalModal();
        if(confirmCallback) confirmCallback();
    };

}

function closeGlobalModal(){
    document.getElementById("globalModal").style.display = "none";
}

</script>

<div id="globalModal" class="error-overlay" style="display:none;">
    <div class="error-modal">
        <h2 id="modalTitle"></h2>
        <p id="modalMessage"></p>
        <div style="margin-top:20px;">
            <button id="modalConfirmBtn" class="btn teacher">Confirm</button>
            <button onclick="closeGlobalModal()" class="btn secondary">Cancel</button>
        </div>
    </div>
</div>
{% endblock %}
